      <circle cx="61" cy="62" r="5" fill="#050A0F"/>
      <circle cx="83" cy="62" r="5" fill="#050A0F"/>
      <path d="M66 72C69 75 75 75 78 72" stroke="#050A0F" stroke-width="4" stroke-linecap="round"/>
      <path d="M109 36C119 39 126 48 126 61C126 74 119 83 109 86" stroke="#7FF2C2" stroke-width="8" stroke-linecap="round"/>
