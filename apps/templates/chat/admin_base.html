<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}Chatt{% endblock %} · 1010monky admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/icons/around-icons.min.css">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/theme.min.css">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/1010monky-brand.css?v=20260628-pagetitle">
    <style>
      :root { --monky: #448C74; }
      body { background: #f4f6f8; font-family: 'Inter', sans-serif; }
      .monky-brand { font-weight: 800; letter-spacing: -.02em; }
      .monky-brand .dark { color: #14171a; }
      .monky-brand .green { color: var(--monky); }
      .admin-topbar { background: #fff; border-bottom: 1px solid rgba(0,0,0,.07); }
      .badge-status { font-weight: 600; }
      .s-new    { background: rgba(68,140,116,.14); color: #2f6553; }
      .s-open   { background: rgba(13,110,253,.12); color: #0d6efd; }
      .s-closed { background: rgba(0,0,0,.06);     color: #6c757d; }
      .s-spam   { background: rgba(220,53,69,.12);  color: #dc3545; }
      .conv-row { transition: background .12s ease; }
      .conv-row:hover { background: rgba(68,140,116,.05); }
      .conv-row.unread { background: rgba(68,140,116,.07); }
      .btn-monky { background: var(--monky); border-color: var(--monky); color: #fff; }
      .btn-monky:hover { background: #3a7a64; border-color: #3a7a64; color: #fff; }
      .bubble { max-width: 78%; border-radius: 1rem; padding: .7rem 1rem; line-height: 1.45; }
      .bubble-visitor { background: #fff; border: 1px solid rgba(0,0,0,.08); }
      .bubble-admin   { background: var(--monky); color: #fff; }
      .bubble-bot     { background: #efe7d6; }
      .bubble-system  { background: transparent; color: #8a9099; font-size: .85rem; }
      .meta { font-size: .76rem; color: #8a9099; }
    </style>
</head>
<body>
    <header class="admin-topbar py-2 mb-4">
        <div class="container d-flex align-items-center">
            <a href="{{ url_for('chat_blueprint.admin_inbox') }}" class="text-decoration-none me-4">
                <span class="monky-brand fs-5"><span class="dark">1010</span><span class="green">monky</span></span>
                <span class="text-body-secondary fs-sm ms-1">chatt</span>
            </a>
            {% if session.get('chat_admin') %}
            <nav class="d-flex align-items-center ms-auto gap-3">
                <a class="nav-link p-0 fs-sm" href="{{ url_for('chat_blueprint.admin_inbox') }}">Inkorg</a>
                <a class="nav-link p-0 fs-sm text-body-secondary" href="{{ url_for('chat_blueprint.admin_logout') }}">Logga ut</a>
            </nav>
            {% endif %}
        </div>
    </header>
    <main class="container pb-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }} py-2">{{ msg }}</div>
          {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
