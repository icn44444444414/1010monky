<svg width="640" height="160" viewBox="0 0 640 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">1010monky logo</title>
  <desc id="desc">A 1010monky wordmark with a stylized half monkey face forming the m letter.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#050A0F" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#8DEBFF" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="wordGradient" x1="0" y1="34" x2="628" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8DEBFF"/>
      <stop offset="0.52" stop-color="#D9FBFF"/>
      <stop offset="1" stop-color="#7FF2C2"/>
    </linearGradient>
  </defs>

  <rect x="8" y="18" width="624" height="124" rx="34" fill="#123249" fill-opacity="0.18"/>

