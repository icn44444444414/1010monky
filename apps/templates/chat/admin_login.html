{# Fristaende vanilla-login (ingen Bootstrap). Anvander designsystemet. #}
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Logga in · 1010monky admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/system/tokens.css?v=8">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/system/base.css?v=8">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: var(--surface-2); padding: var(--space-5); }
        .login-card { background: var(--surface); box-shadow: var(--shadow-md); padding: var(--space-7); width: 100%; max-width: 380px; }
        .login-brand { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--text-xl); }
        .login-brand span { color: var(--accent); }
        .login-flash { margin-bottom: var(--space-4); padding: .6rem .9rem; font-size: var(--text-sm); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">1010<span>monky</span> · admin</div>
        <p class="text-secondary" style="margin: var(--space-2) 0 var(--space-5); font-size: var(--text-sm);">Logga in för att se konversationerna.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, msg in messages %}
            <div class="login-flash" style="background: {{ '#fdeaea' if category == 'danger' else '#e8f4ee' }}; color: {{ '#a32a2a' if category == 'danger' else '#1f6a4f' }};">{{ msg }}</div>
          {% endfor %}
        {% endwith %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field" style="margin-bottom: var(--space-4);">
                <label class="label" for="password">Lösenord</label>
                <input class="input" type="password" id="password" name="password" autofocus required>
            </div>
            <button class="btn btn-primary" style="width: 100%;" type="submit">Logga in</button>
        </form>
    </div>
</body>
</html>
