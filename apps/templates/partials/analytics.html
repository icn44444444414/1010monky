{% set ga_id = config.get('GA_MEASUREMENT_ID') %}
{% if ga_id and not config.get('MAINTENANCE_MODE') %}
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){window.dataLayer.push(arguments);}

  gtag('consent', 'default', {
    ad_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    analytics_storage: 'denied'
  });

  gtag('js', new Date());
  gtag('config', '{{ ga_id }}', { send_page_view: false });

  window.monkyAnalyticsGranted = false;
  window.monkyAnalyticsId = '{{ ga_id }}';
  window.monkyTrack = function (name, params) {
    if (!window.monkyAnalyticsGranted || typeof gtag !== 'function') return;
    gtag('event', name, Object.assign({
      page_path: window.location.pathname,
      page_title: document.title
    }, params || {}));
  };
  window.monkyGrantAnalytics = function () {
    if (typeof gtag !== 'function') return;
    window.monkyAnalyticsGranted = true;
    gtag('consent', 'update', { analytics_storage: 'granted' });
    gtag('event', 'page_view', {
      page_title: document.title,
      page_location: window.location.href,
      page_path: window.location.pathname
    });
  };

  (function () {
    function hrefLabel(href) {
      try {
        var url = new URL(href, window.location.href);
        return url.origin === window.location.origin ? url.pathname : url.hostname;
      } catch (e) {
        return '';
      }
    }

    document.addEventListener('click', function (event) {
      var target = event.target.closest('a, button');
      if (!target || !window.monkyTrack) return;

      var text = (target.textContent || '').trim().toLowerCase();
      var href = target.getAttribute && target.getAttribute('href');

      if (href && href.indexOf('tel:') === 0) {
        window.monkyTrack('phone_click', { link_type: 'tel' });
        return;
      }

      if (href && href.indexOf('mailto:') === 0) {
        window.monkyTrack('mail_click', { link_type: 'mailto' });
        return;
      }

      if (text.indexOf('starta projekt') !== -1 || text.indexOf('aloita projekti') !== -1 || href === '/kontakt') {
        window.monkyTrack('start_project_click', { link_url: hrefLabel(href || window.location.href) });
      }

      if (href) {
        window.monkyTrack('link_click', { link_url: hrefLabel(href) });
      }
    });

    document.addEventListener('submit', function (event) {
      var form = event.target;
      if (!form || !window.monkyTrack) return;
      window.monkyTrack('form_submit', {
        form_id: form.id || '',
        form_name: form.getAttribute('name') || '',
        form_action: hrefLabel(form.getAttribute('action') || window.location.href)
      });
    }, true);

    var sentScroll = {};
    var ticking = false;
    window.addEventListener('scroll', function () {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function () {
        ticking = false;
        var doc = document.documentElement;
        var scrollable = Math.max(1, doc.scrollHeight - window.innerHeight);
        var depth = Math.round((window.scrollY / scrollable) * 100);
        [50, 90].forEach(function (mark) {
          if (depth >= mark && !sentScroll[mark]) {
            sentScroll[mark] = true;
            window.monkyTrack('scroll_depth', { percent_scrolled: mark });
          }
        });
      });
    }, { passive: true });
  })();

  try {
    if (localStorage.getItem('monky_cookie_consent') === 'analytics') {
      window.monkyGrantAnalytics();
    }
  } catch (e) {}
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id|e }}"></script>
{% endif %}
