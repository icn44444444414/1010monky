<!-- 1010monky chatt-widget (publik). Anonym, sakrad via /api/chat. -->
<div id="monky-chat">
  <!-- Launcher: chatt-bubbla med apan sittande pa toppen -->
  <button id="monky-chat-launcher" type="button" aria-label="Oppna chatten">
    <img class="mc-monkey-sit" src="{{ config.ASSETS_ROOT }}/img/monkey-logo.webp" alt="" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M4 5.5h16a1.5 1.5 0 0 1 1.5 1.5v8a1.5 1.5 0 0 1-1.5 1.5H9l-4 3.2V16.5H4A1.5 1.5 0 0 1 2.5 15V7A1.5 1.5 0 0 1 4 5.5Z" fill="#fff"/>
    </svg>
    <span class="mc-badge" aria-hidden="true"></span>
  </button>
  <span id="mc-hint" class="mc-hint" role="button" tabindex="0">Chatta med oss</span>

  <!-- Panel -->
  <section id="monky-chat-panel" role="dialog" aria-label="Chatta med Matias" aria-modal="false">
    <img class="mc-monkey-hang" src="{{ config.ASSETS_ROOT }}/img/monkey-logo.webp" alt="" aria-hidden="true">
    <div class="mc-shell">
      <header class="mc-header">
        <div>
          <div class="mc-title">Chatta med Matias</div>
          <div class="mc-status"><span class="mc-dot"></span> Svarar oftast inom kort</div>
        </div>
        <button id="mc-close" class="mc-close" type="button" aria-label="Stang chatten">&times;</button>
      </header>

      <div id="mc-body" class="mc-body">
        <div id="mc-intro" class="mc-intro">
          Hej! Behover du hjalp med hemsida, WordPress, pris eller skraddarsydd utveckling?
          Skriv har sa hjalper jag dig vidare.
          <div class="mc-quick">
            <button class="mc-chip" type="button" data-msg="Jag vill ha en ny hemsida">Ny hemsida</button>
            <button class="mc-chip" type="button" data-msg="Jag har en prisfraga">Prisfraga</button>
            <button class="mc-chip" type="button" data-msg="Jag behover hjalp med WordPress">WordPress</button>
            <button class="mc-chip" type="button" data-msg="Jag vill veta mer om automation">Automation</button>
            <button class="mc-chip" type="button" data-msg="Jag vill prata med Matias">Prata med Matias</button>
          </div>
        </div>
      </div>

      <footer class="mc-footer">
        <div class="mc-inputrow">
          <textarea id="mc-input" class="mc-input" rows="1" placeholder="Skriv ett meddelande..." aria-label="Ditt meddelande"></textarea>
          <button id="mc-send" class="mc-send" type="button" aria-label="Skicka">&#10148;</button>
        </div>
        <input id="mc-hp" class="mc-hp" type="text" tabindex="-1" autocomplete="off" name="website" aria-hidden="true">
        <div class="mc-foot-note">Vill du prata personligen skickas det vidare direkt till Matias.</div>
      </footer>
    </div>
  </section>
</div>

<link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/chat-widget.css?v=3">
<script src="{{ config.ASSETS_ROOT }}/js/chat-widget.js?v=3" defer></script>
