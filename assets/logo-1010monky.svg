      <path d="M28 104V57C28 28 48 15 72 15C96 15 116 28 116 57V104H92V67C92 57 87 51 79 51C70 51 66 58 66 72V104H42V72C42 58 38 51 30 51C22 51 17 57 17 67V104H28Z" fill="#9ADFFF" stroke="#050A0F" stroke-width="7" stroke-linejoin="round"/>
